services:
  jupyter-node:
    build: .
    ports:
      - "${JUPYTER_NODE_PORT:-8002}:${JUPYTER_NODE_PORT:-8002}"
      - "${JUPYTER_LAB_PORT:-8888}:${JUPYTER_LAB_PORT:-8888}"
    environment:
      - NODE_NAME=jupyter-node
      - NODE_TYPE=jupyter
      - NODE_PORT=${JUPYTER_NODE_PORT:-8002}
      - JUPYTER_NODE_VERSION=${JUPYTER_NODE_VERSION:-0.5.8}
      - JUPYTER_LAB_PORT=${JUPYTER_LAB_PORT:-8888}
      - SIBLING_MODEL_NODE_URL=${SIBLING_MODEL_NODE_URL:-http://model-node:8001}
      - SIBLING_QISKIT_NODE_URL=${SIBLING_QISKIT_NODE_URL:-http://qiskit-node:8003}
      - SIBLING_CHENG_DATASET_NODE_URL=${SIBLING_CHENG_DATASET_NODE_URL:-http://cheng-dataset-node:8004}
      - SIBLING_CTGOV_DATASET_NODE_URL=${SIBLING_CTGOV_DATASET_NODE_URL:-http://ctgov-dataset-node:8010}
      - CHENG_POSTGRES_DSN=${CHENG_POSTGRES_DSN:-postgresql://cheng:cheng@cheng-postgres:5432/cheng}
      - ORCHESTRATOR_URL=${ORCHESTRATOR_URL:-}
      - NOTEBOOK_SYNC_MODE=${NOTEBOOK_SYNC_MODE:-reconcile}
      - NOTEBOOK_SYNC_VERSION=${NOTEBOOK_SYNC_VERSION:-local-dev}
    volumes:
      # Notebooks and user work persist on the host at ./workspace and are
      # never committed to git (see .gitignore). The directory is created
      # automatically on first `docker compose up`.
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${JUPYTER_NODE_PORT:-8002}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agentnet

networks:
  agentnet:
    name: agentnet
    external: true
