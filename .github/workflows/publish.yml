name: Sync ACR Image To GHCR

# Manual backfill/sync only. The canonical build+deploy flow lives in
# build-push.yml and is the only automatic workflow on push/tag.
on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "ACR source tag to copy (e.g. v0.6.3, sha-abcdef0, latest)"
        required: true
        type: string

env:
  ACR_NAME: acragenticaiprod
  ACR_IMAGE: acragenticaiprod.azurecr.io/agentic-jupyter-node
  GHCR_IMAGE: ghcr.io/labmarketai/agentic-jupyter-node

jobs:
  sync:
    name: Copy ACR artifact to GHCR
    if: github.repository_owner == 'LabmarketAI'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy image
        run: |
          SRC="${{ env.ACR_IMAGE }}:${{ inputs.source_tag }}"
          DST="${{ env.GHCR_IMAGE }}:${{ inputs.source_tag }}"
          docker pull "$SRC"
          docker tag "$SRC" "$DST"
          docker push "$DST"
          echo "Copied $SRC -> $DST" >> "$GITHUB_STEP_SUMMARY"
