name: Build, Publish and Deploy

# push v*.*.*  → publish to GHCR + deploy to ACA prod
# push main    → build + publish :latest to GHCR
# pull_request → build validate only
# workflow_dispatch → manual publish + optional ACA deploy

on:
  push:
    tags: ['v*.*.*']
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to ACA prod after build'
        required: false
        type: boolean
        default: false

env:
  GHCR_IMAGE: ghcr.io/labmarketai/agentic-jupyter-node
  ACR_IMAGE: acragenticaiprod.azurecr.io/agentic-jupyter-node
  PACKAGE_NAME: agentic-jupyter-node
  ACA_APP_NAME: ca-jupyter-node-agentic-prod
  ACA_RESOURCE_GROUP: rg-agentic-prod

jobs:

  build:
    name: Build (validate)
    runs-on: ubuntu-latest
    if: github.repository_owner == 'LabmarketAI'
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR
        run: az acr login --name acragenticaiprod
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
      - name: Build and push (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  make-public:
    name: Make GHCR package public
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      packages: write
    steps:
      - name: Set package visibility to public
        continue-on-error: true
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/LabmarketAI/packages/container/${{ env.PACKAGE_NAME }} \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-aca:
    name: Deploy to ACA prod
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deploy image
        id: image
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tag=${{ env.ACR_IMAGE }}:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "agent_card_version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ env.ACR_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "agent_card_version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update ACA revision
        run: |
          az containerapp update \
            --name "${{ env.ACA_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --image "${{ steps.image.outputs.tag }}" \
            --set-env-vars "AGENT_CARD_VERSION=${{ steps.image.outputs.agent_card_version }}" "NOTEBOOK_SYNC_MODE=overwrite" \
            --output none
          echo "Deployed ${{ steps.image.outputs.tag }} to ${{ env.ACA_APP_NAME }}" >> $GITHUB_STEP_SUMMARY

      - name: Point orchestrator to deployed jupyter FQDN
        run: |
          JUP_FQDN=$(az containerapp show \
            --name "${{ env.ACA_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          if [[ -z "$JUP_FQDN" ]]; then
            echo "Unable to resolve jupyter FQDN" >&2
            exit 1
          fi
          az containerapp update \
            --name ca-orchestrator-agentic-prod \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --set-env-vars "SIBLING_JUPYTER_NODE_URL=https://${JUP_FQDN}" \
            --output none
          echo "Updated orchestrator SIBLING_JUPYTER_NODE_URL=https://${JUP_FQDN}" >> $GITHUB_STEP_SUMMARY

      - name: Verify health
        run: |
          sleep 60
          FQDN=$(az containerapp show \
            --name "${{ env.ACA_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/health")
          if [[ "$HTTP" != "200" ]]; then echo "Health check failed (HTTP $HTTP)" >&2; exit 1; fi
          echo "Health OK ($HTTP) — https://${FQDN}" >> $GITHUB_STEP_SUMMARY
