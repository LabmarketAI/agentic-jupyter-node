name: Build, Push to ACR and Deploy

# push main            → build + push :sha-<sha> + :latest to ACR
# push v*.*.*          → build + push :v<version> + :sha-<sha> + deploy to ACA prod
# repository_dispatch  → rebuild when agentic-node-base image is updated
# workflow_dispatch    → manual build+push + optional deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [node-base-updated]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to ACA prod after build'
        required: false
        type: boolean
        default: false

env:
  ACR_LOGIN_SERVER: acragenticaiprod.azurecr.io
  ACR_NAME: acragenticaiprod
  IMAGE_NAME: agentic-jupyter-node
  GHCR_IMAGE: ghcr.io/labmarketai/agentic-jupyter-node
  ACA_ENV_NAME: cae-agentic-prod
  ACA_APP_NAME: ca-jupyter-node-agentic-prod
  ACA_RESOURCE_GROUP: rg-agentic-prod

jobs:
  build-push:
    name: Build & Push to ACR
    if: github.repository_owner == 'LabmarketAI'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      version_tag: ${{ steps.tags.outputs.version_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate notebooks schema
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          notebooks_dir = Path("notebooks")
          if not notebooks_dir.is_dir():
            print("No notebooks directory found; failing build")
            sys.exit(1)

          required = {"cells", "metadata", "nbformat", "nbformat_minor"}
          failures = []
          checked = 0

          for path in sorted(notebooks_dir.glob("*.ipynb")):
            checked += 1
            try:
              with path.open("r", encoding="utf-8") as fh:
                data = json.load(fh)
            except Exception as exc:
              failures.append(f"{path}: invalid JSON ({exc})")
              continue

            missing = sorted(required - set(data.keys()))
            if missing:
              failures.append(f"{path}: missing keys {', '.join(missing)}")
              continue

            if not isinstance(data.get("cells"), list):
              failures.append(f"{path}: 'cells' must be a list")

          if checked == 0:
            failures.append("No .ipynb files found in notebooks/")

          if failures:
            print("Notebook validation failed:")
            for item in failures:
              print(f"- {item}")
            sys.exit(1)

          print(f"Notebook validation passed for {checked} file(s).")
          PY

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt --format markdown --output pip-audit.md || true
          cat pip-audit.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          # CVE-2026-4539: pygments transitive dep — no fix released yet; re-evaluate when pygments >2.19.2 ships
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-4539

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Resolve image tags
        id: tags
        run: |
          SHA_TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version_tag=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "push_tags=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${VERSION},${SHA_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=" >> "$GITHUB_OUTPUT"
            echo "push_tags=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest,${SHA_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.push_tags }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  sync-ghcr:
    name: Sync ACR image to GHCR
    needs: build-push
    if: github.repository_owner == 'LabmarketAI' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy exact ACR artifact to GHCR
        run: |
          SRC_IMAGE="${{ needs.build-push.outputs.sha_tag }}"
          docker pull "$SRC_IMAGE"

          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=("sha-${SHORT_SHA}")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS+=("$VERSION")
            if [[ "$VERSION" == v* ]]; then
              TAGS+=("${VERSION#v}")
            fi
            TAGS+=("latest")
          else
            TAGS+=("latest")
          fi

          for tag in "${TAGS[@]}"; do
            DEST="${{ env.GHCR_IMAGE }}:${tag}"
            docker tag "$SRC_IMAGE" "$DEST"
            docker push "$DEST"
            echo "Pushed $DEST" >> "$GITHUB_STEP_SUMMARY"
          done

  deploy:
    name: Deploy to ACA prod
    needs: build-push
    if: |
      github.repository_owner == 'LabmarketAI' && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy)
      )
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update ACA revision
        run: |
          IMAGE="${{ needs.build-push.outputs.version_tag || needs.build-push.outputs.sha_tag }}"
          export IMAGE
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            AGENT_CARD_VERSION="${GITHUB_REF#refs/tags/v}"
          else
            AGENT_CARD_VERSION="sha-${GITHUB_SHA::7}"
          fi
          export AGENT_CARD_VERSION

          STORAGE_ACCOUNT=$(az storage account list \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)

          if [[ -z "$STORAGE_ACCOUNT" ]]; then
            echo "No storage account found in ${{ env.ACA_RESOURCE_GROUP }}" >&2
            exit 1
          fi

          STORAGE_KEY=$(az storage account keys list \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --account-name "$STORAGE_ACCOUNT" \
            --query "[0].value" -o tsv)

          az storage share-rm create \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --storage-account "$STORAGE_ACCOUNT" \
            --name jupyter-workspace \
            --quota 100 \
            --output none || true

          az containerapp env storage set \
            --name "${{ env.ACA_ENV_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --storage-name jupyter-workspace \
            --azure-file-account-name "$STORAGE_ACCOUNT" \
            --azure-file-account-key "$STORAGE_KEY" \
            --azure-file-share-name jupyter-workspace \
            --access-mode ReadWrite \
            --output none

          az containerapp show \
            --name ${{ env.ACA_APP_NAME }} \
            --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
            -o json > /tmp/jupyter-aca.json

          python3 - <<'PY'
          import json
          import os

          path = '/tmp/jupyter-aca.json'
          with open(path, 'r', encoding='utf-8') as f:
            doc = json.load(f)

          props = doc.setdefault('properties', {})
          template = props.setdefault('template', {})
          containers = template.get('containers') or []
          template['containers'] = containers
          if not containers:
            raise RuntimeError('No containers found in Container App template')

          container = containers[0]
          container['image'] = os.environ['IMAGE']
          # Ensure startup always runs /app/start.sh where notebook sync occurs.
          container['command'] = ['sh', '/app/start.sh']
          container['args'] = []
          env = container.get('env') or []
          container['env'] = env

          found_env = False
          for item in env:
            if item.get('name') == 'JUPYTER_ROOT_DIR':
              item['value'] = '/workspace'
              item.pop('secretRef', None)
              found_env = True
              break
          if not found_env:
            env.append({'name': 'JUPYTER_ROOT_DIR', 'value': '/workspace'})

          found_agent_card_version = False
          for item in env:
            if item.get('name') == 'AGENT_CARD_VERSION':
              item['value'] = os.environ['AGENT_CARD_VERSION']
              item.pop('secretRef', None)
              found_agent_card_version = True
              break
          if not found_agent_card_version:
            env.append({'name': 'AGENT_CARD_VERSION', 'value': os.environ['AGENT_CARD_VERSION']})

          found_notebook_sync_mode = False
          for item in env:
            if item.get('name') == 'NOTEBOOK_SYNC_MODE':
              item['value'] = 'overwrite'
              item.pop('secretRef', None)
              found_notebook_sync_mode = True
              break
          if not found_notebook_sync_mode:
            env.append({'name': 'NOTEBOOK_SYNC_MODE', 'value': 'overwrite'})

          volumes = template.get('volumes') or []
          template['volumes'] = volumes
          if not any(v.get('name') == 'workspace' for v in volumes):
            volumes.append({
              'name': 'workspace',
              'storageType': 'AzureFile',
              'storageName': 'jupyter-workspace'
            })

          volume_mounts = container.get('volumeMounts') or []
          container['volumeMounts'] = volume_mounts
          if not any(m.get('volumeName') == 'workspace' and m.get('mountPath') == '/workspace' for m in volume_mounts):
            volume_mounts.append({
              'volumeName': 'workspace',
              'mountPath': '/workspace'
            })

          output = {'properties': {'template': props['template']}}
          with open(path, 'w', encoding='utf-8') as f:
            json.dump(output, f)
          PY

          az containerapp update \
            --name ${{ env.ACA_APP_NAME }} \
            --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
            --yaml /tmp/jupyter-aca.json \
            --output none
          echo "Deployed ${IMAGE} to ${{ env.ACA_APP_NAME }}" >> $GITHUB_STEP_SUMMARY

      - name: Verify revision activated
        run: |
          EXPECTED_IMAGE="${{ needs.build-push.outputs.version_tag || needs.build-push.outputs.sha_tag }}"
          for i in $(seq 1 24); do
            ACTIVE_IMAGE=$(az containerapp show \
              --name ${{ env.ACA_APP_NAME }} \
              --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
              --query "properties.template.containers[0].image" -o tsv)
            HEALTH=$(az containerapp revision list \
              --name ${{ env.ACA_APP_NAME }} \
              --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
              --query "[?properties.active] | [0].properties.healthState" -o tsv)
            echo "[$i/24] image=${ACTIVE_IMAGE} health=${HEALTH}"
            if [[ "$ACTIVE_IMAGE" == "$EXPECTED_IMAGE" && "$HEALTH" == "Healthy" ]]; then
              echo "Revision active and healthy" >> $GITHUB_STEP_SUMMARY
              break
            fi
            if [[ $i -eq 24 ]]; then
              echo "Revision did not become healthy after 4 minutes" >&2
              az containerapp revision list \
                --name ${{ env.ACA_APP_NAME }} \
                --resource-group ${{ env.ACA_RESOURCE_GROUP }} \
                --query "[].{name:name, active:properties.active, health:properties.healthState, image:properties.template.containers[0].image}" \
                -o table >&2
              exit 1
            fi
            sleep 10
          done

      - name: Verify jupyter deploy
        run: |
          # ca-jupyter-node-agentic-prod has internal ingress — not reachable from
          # GitHub Actions runners. Verify correctness via ACA env vars instead.
          DEPLOYED_VERSION=$(az containerapp show \
            --name "${{ env.ACA_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].env[?name=='AGENT_CARD_VERSION'].value" \
            -o tsv)
          DEPLOYED_SYNC_MODE=$(az containerapp show \
            --name "${{ env.ACA_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].env[?name=='NOTEBOOK_SYNC_MODE'].value" \
            -o tsv)
          echo "AGENT_CARD_VERSION=${DEPLOYED_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "NOTEBOOK_SYNC_MODE=${DEPLOYED_SYNC_MODE}" >> $GITHUB_STEP_SUMMARY

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            EXPECTED_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "$DEPLOYED_VERSION" != "$EXPECTED_VERSION" ]]; then
              echo "Version mismatch: expected ${EXPECTED_VERSION}, got ${DEPLOYED_VERSION}" >&2
              exit 1
            fi
            echo "Version confirmed: ${DEPLOYED_VERSION}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Reset notebook sync mode to missing
        run: |
          az containerapp update \
            --name "${{ env.ACA_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --set-env-vars "NOTEBOOK_SYNC_MODE=missing" \
            --output none
          echo "NOTEBOOK_SYNC_MODE reset to missing" >> $GITHUB_STEP_SUMMARY

      - name: Point orchestrator to deployed jupyter FQDN
        run: |
          JUP_FQDN=$(az containerapp show \
            --name "${{ env.ACA_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          if [[ -z "$JUP_FQDN" ]]; then
            echo "Unable to resolve jupyter FQDN" >&2
            exit 1
          fi
          NEW_URL="https://${JUP_FQDN}"
          CURRENT_SIBLING=$(az containerapp show \
            --name ca-orchestrator-agentic-prod \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].env[?name=='SIBLING_JUPYTER_NODE_URL'].value" \
            -o tsv)
          if [[ "$CURRENT_SIBLING" != "$NEW_URL" ]]; then
            az containerapp update \
              --name ca-orchestrator-agentic-prod \
              --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
              --set-env-vars "SIBLING_JUPYTER_NODE_URL=${NEW_URL}" \
              --output none
            echo "Updated orchestrator SIBLING_JUPYTER_NODE_URL: ${CURRENT_SIBLING} -> ${NEW_URL}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Orchestrator SIBLING_JUPYTER_NODE_URL unchanged (${NEW_URL}), skipping update" >> $GITHUB_STEP_SUMMARY
          fi
